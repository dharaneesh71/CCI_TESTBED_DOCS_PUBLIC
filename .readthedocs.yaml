# .readthedocs.yaml
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  apt_packages:
    - graphviz
    - git-lfs
  jobs:
    post_checkout:
      - git lfs install
      - git lfs fetch
      - git lfs checkout

sphinx:
  configuration: source/conf.py

python:
  install:
    - requirements: requirements.txt